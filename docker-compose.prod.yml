version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hotspot_analysis_postgres_prod
    environment:
      POSTGRES_DB: hotspot_analysis
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=md5 --auth-local=trust"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: hotspot_analysis_redis_prod
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: hotspot_analysis_backend_prod
    ports:
      - "8001:8000"
    environment:
      - APP_NAME=AI超级热点解析助手
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost,http://localhost:3000,http://localhost:3001}
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD}@postgres/hotspot_analysis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MOCK_MODE=False
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - UPDATE_SCHEDULE=${UPDATE_SCHEDULE:-0 2 * * *}
      - MAX_HOTSPOTS_PER_UPDATE=${MAX_HOTSPOTS_PER_UPDATE:-100}
      - USE_MOCK_COLLECTOR=False
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: hotspot_analysis_celery_worker_prod
    environment:
      - APP_NAME=AI超级热点解析助手
      - DEBUG=False
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD}@postgres/hotspot_analysis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MOCK_MODE=False
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - USE_MOCK_COLLECTOR=False
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: hotspot_analysis_celery_beat_prod
    environment:
      - APP_NAME=AI超级热点解析助手
      - DEBUG=False
      - DATABASE_URL=postgresql+asyncpg://${DB_USER:-admin}:${DB_PASSWORD}@postgres/hotspot_analysis
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MOCK_MODE=False
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD}@redis:6379/0
      - USE_MOCK_COLLECTOR=False
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: hotspot_analysis_frontend_prod
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=/api/v1
    depends_on:
      - backend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 128M

volumes:
  postgres_data_prod:
  redis_data_prod: