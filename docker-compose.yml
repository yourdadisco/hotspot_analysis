version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: hotspot_analysis_postgres
    environment:
      POSTGRES_DB: hotspot_analysis
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hotspot_analysis_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: hotspot_analysis_backend
    user: root
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+asyncpg://admin:dev_password@postgres/hotspot_analysis
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-274f031095b04a6a90cbef3ec319281f}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MOCK_MODE=${LLM_MOCK_MODE:-false}
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: ./backend
    container_name: hotspot_analysis_celery_worker
    user: root
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+asyncpg://admin:dev_password@postgres/hotspot_analysis
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-274f031095b04a6a90cbef3ec319281f}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MOCK_MODE=${LLM_MOCK_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4

  celery-beat:
    build: ./backend
    container_name: hotspot_analysis_celery_beat
    user: root
    environment:
      - PYTHONPATH=/app/src
      - DATABASE_URL=postgresql+asyncpg://admin:dev_password@postgres/hotspot_analysis
      - REDIS_URL=redis://redis:6379/0
      - LLM_API_KEY=${LLM_API_KEY:-sk-274f031095b04a6a90cbef3ec319281f}
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_MOCK_MODE=${LLM_MOCK_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.tasks.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hotspot_analysis_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: